{{ define "main" -}}
<div class="posts">
{{ range .Site.Sections -}}
    <h1 style="font-size: 3.25rem; margin-bottom: 1rem;"><a href={{ .RelPermalink }}>{{ .Title }}</a></h1>
    {{ range .Data.Pages -}}
        <h2 style="font-size: 2.75rem; margin-bottom: 1rem;"><a href={{ .RelPermalink }}>{{ .Title }}</a></h2>
        {{ range .RegularPages -}}
<article class="post">
  <h1 class="post-title">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
  </h1>
  <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z0700" }}" class="post-date">{{ .Date.Format "Mon, Jan 2, 2006" }}</time>
  {{ .Summary }}
  {{ if .Truncated }}
  <div class="read-more-link">
      <a href="{{ .RelPermalink }}">Read More…</a>
  </div>
  {{ end }}
</article>
{{- end }}
{{- end }}
{{- end }}
</div>
{{- end }}
